{% extends 'base.html' %}
{% block title %}Admin Dashboard{% endblock %}
{% block content %}
<div class="container">
    <h2 style="color:#1a3c34; margin-bottom:30px;">Admin Dashboard</h2>

    <!-- Stats -->
    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-bottom:40px;" id="stats">
        <div style="background:#1a3c34; color:white; padding:24px; border-radius:12px; text-align:center;">
            <div style="font-size:36px; font-weight:700; color:#d4a853;" id="total-users">-</div>
            <div style="margin-top:8px;">Total Users</div>
        </div>
        <div style="background:#1a3c34; color:white; padding:24px; border-radius:12px; text-align:center;">
            <div style="font-size:36px; font-weight:700; color:#d4a853;" id="total-properties">-</div>
            <div style="margin-top:8px;">Properties</div>
        </div>
        <div style="background:#1a3c34; color:white; padding:24px; border-radius:12px; text-align:center;">
            <div style="font-size:36px; font-weight:700; color:#d4a853;" id="total-bookings">-</div>
            <div style="margin-top:8px;">Total Bookings</div>
        </div>
    </div>

    <!-- Users Table -->
    <h3 style="color:#1a3c34; margin-bottom:16px;">All Users</h3>
    <div style="background:white; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.08); margin-bottom:40px;">
        <table style="width:100%; border-collapse:collapse;">
            <thead style="background:#1a3c34; color:white;">
                <tr>
                    <th style="padding:12px 16px; text-align:left;">ID</th>
                    <th style="padding:12px 16px; text-align:left;">Email</th>
                    <th style="padding:12px 16px; text-align:left;">Role</th>
                    <th style="padding:12px 16px; text-align:left;">Created</th>
                </tr>
            </thead>
            <tbody id="users-table"></tbody>
        </table>
    </div>

    <!-- Bookings Table -->
    <h3 style="color:#1a3c34; margin-bottom:16px;">All Bookings</h3>
    <div style="background:white; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.08);">
        <table style="width:100%; border-collapse:collapse;">
            <thead style="background:#1a3c34; color:white;">
                <tr>
                    <th style="padding:12px 16px; text-align:left;">ID</th>
                    <th style="padding:12px 16px; text-align:left;">User</th>
                    <th style="padding:12px 16px; text-align:left;">Property</th>
                    <th style="padding:12px 16px; text-align:left;">Check-in</th>
                    <th style="padding:12px 16px; text-align:left;">Check-out</th>
                    <th style="padding:12px 16px; text-align:left;">Status</th>
                </tr>
            </thead>
            <tbody id="bookings-table"></tbody>
        </table>
    </div>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) { alert('Admin access required'); window.location.href = '/'; }

// Load stats
fetch('/api/admin/stats', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(r => r.json())
    .then(data => {
        if (data.error) { alert(data.error); window.location.href = '/'; return; }
        document.getElementById('total-users').textContent = data.total_users;
        document.getElementById('total-properties').textContent = data.total_properties;
        document.getElementById('total-bookings').textContent = data.total_bookings;
    });

// Load users
fetch('/api/admin/users', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(r => r.json())
    .then(data => {
        const tbody = document.getElementById('users-table');
        data.forEach(u => {
            tbody.innerHTML += `<tr style="border-bottom:1px solid #eee;">
                <td style="padding:12px 16px;">${u.id}</td>
                <td style="padding:12px 16px;">${u.email}</td>
                <td style="padding:12px 16px;"><span style="background:${u.role==='admin'?'#fef3e8':'#e8f4ec'}; color:${u.role==='admin'?'#c4673a':'#2d5a4a'}; padding:3px 10px; border-radius:20px; font-size:12px;">${u.role}</span></td>
                <td style="padding:12px 16px; color:#666; font-size:13px;">${u.created_at}</td>
            </tr>`;
        });
    });

// Load bookings
fetch('/api/admin/bookings', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(r => r.json())
    .then(data => {
        const tbody = document.getElementById('bookings-table');
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="padding:20px; text-align:center; color:#888;">No bookings yet</td></tr>';
            return;
        }
        data.forEach(b => {
            tbody.innerHTML += `<tr style="border-bottom:1px solid #eee;">
                <td style="padding:12px 16px;">${b.id}</td>
                <td style="padding:12px 16px;">${b.user_id}</td>
                <td style="padding:12px 16px;">${b.property_id}</td>
                <td style="padding:12px 16px;">${b.check_in}</td>
                <td style="padding:12px 16px;">${b.check_out}</td>
                <td style="padding:12px 16px;"><span style="background:#e8f4ec; color:#2d5a4a; padding:3px 10px; border-radius:20px; font-size:12px;">${b.status}</span></td>
            </tr>`;
        });
    });
</script>
{% endblock %}
